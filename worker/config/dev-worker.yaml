gromozeka:
  runtime:
    worker:
      id: local-dev
      version: dev
      capabilities:
        - CONVERSATION_TURN
        - LLM_RUNTIME
        - TOOL_EXECUTION
        - LOCAL_AGENT_TOOL
        - MEMORY_PIPELINE
      workspaces:
        - id: gromozeka-dev
          project-id: gromozeka
          project-name: Gromozeka
          name: Development
          root-path: ${GROMOZEKA_WORKSPACE_ROOT:${gromozeka.project.root}}
