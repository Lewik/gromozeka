name: Build and Deploy AWS

on:
  workflow_dispatch:
    inputs:
      push_images:
        description: Push verified images to Amazon ECR
        required: true
        type: boolean
        default: false
      deploy:
        description: Deploy the pushed commit SHA to the AWS instance
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: cloud-images-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'il-central-1' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Validate workflow inputs
        shell: bash
        run: |
          if [[ "${{ inputs.deploy }}" == "true" && "${{ inputs.push_images }}" != "true" ]]; then
            echo "deploy=true requires push_images=true" >&2
            exit 2
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and assemble cloud artifacts
        run: >
          ./gradlew
          :server:test
          :worker:test
          :server:bootJar
          :worker:bootJar
          :presentation:wasmJsBrowserDistribution
          -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        if: inputs.push_images
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_GROMOZEKA_BUILD_ROLE_ARN }}
          allowed-account-ids: ${{ vars.AWS_ACCOUNT_ID }}

      - name: Log in to Amazon ECR
        if: inputs.push_images
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check immutable image tags
        if: inputs.push_images
        id: existing
        shell: bash
        run: |
          if aws ecr describe-images \
            --repository-name gromozeka/server \
            --image-ids "imageTag=$GITHUB_SHA" \
            >/dev/null 2>&1; then
            echo "server=true" >> "$GITHUB_OUTPUT"
          else
            echo "server=false" >> "$GITHUB_OUTPUT"
          fi
          if aws ecr describe-images \
            --repository-name gromozeka/worker \
            --image-ids "imageTag=$GITHUB_SHA" \
            >/dev/null 2>&1; then
            echo "worker=true" >> "$GITHUB_OUTPUT"
          else
            echo "worker=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve image metadata
        id: images
        shell: bash
        run: |
          if [[ "${{ inputs.push_images }}" == "true" ]]; then
            registry="${{ steps.ecr.outputs.registry }}"
          else
            registry="local"
          fi
          echo "server=$registry/gromozeka/server:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "worker=$registry/gromozeka/worker:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/server.Dockerfile
          platforms: linux/amd64
          push: ${{ inputs.push_images && steps.existing.outputs.server != 'true' }}
          tags: ${{ steps.images.outputs.server }}
          cache-from: type=gha,scope=gromozeka-server
          cache-to: type=gha,mode=max,scope=gromozeka-server

      - name: Build worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/worker.Dockerfile
          platforms: linux/amd64
          push: ${{ inputs.push_images && steps.existing.outputs.worker != 'true' }}
          tags: ${{ steps.images.outputs.worker }}
          cache-from: type=gha,scope=gromozeka-worker
          cache-to: type=gha,mode=max,scope=gromozeka-worker

  deploy:
    if: inputs.deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: aws-production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_GROMOZEKA_DEPLOY_ROLE_ARN }}
          allowed-account-ids: ${{ vars.AWS_ACCOUNT_ID }}

      - name: Publish runtime bundle
        id: runtime
        shell: bash
        run: |
          archive="$RUNNER_TEMP/gromozeka-runtime.tar.gz"
          key="runtime/${GITHUB_SHA}.tar.gz"
          tar -C deploy/aws/runtime -czf "$archive" .
          aws s3 cp \
            "$archive" \
            "s3://${{ vars.AWS_GROMOZEKA_ARTIFACT_BUCKET }}/$key" \
            --sse AES256
          echo "key=$key" >> "$GITHUB_OUTPUT"

      - name: Deploy immutable images through SSM
        shell: bash
        run: |
          parameters="$(
            jq -nc \
              --arg imageTag "$GITHUB_SHA" \
              --arg runtimeBundleKey "${{ steps.runtime.outputs.key }}" \
              '{ImageTag:[$imageTag],RuntimeBundleKey:[$runtimeBundleKey]}'
          )"
          command_id="$(
            aws ssm send-command \
              --instance-ids "${{ vars.AWS_GROMOZEKA_INSTANCE_ID }}" \
              --document-name "${{ vars.AWS_GROMOZEKA_DEPLOY_DOCUMENT }}" \
              --parameters "$parameters" \
              --comment "Deploy Gromozeka $GITHUB_SHA" \
              --query 'Command.CommandId' \
              --output text
          )"

          status="Pending"
          for attempt in $(seq 1 180); do
            status="$(
              aws ssm get-command-invocation \
                --command-id "$command_id" \
                --instance-id "${{ vars.AWS_GROMOZEKA_INSTANCE_ID }}" \
                --query Status \
                --output text \
                2>/dev/null || true
            )"
            case "$status" in
              Success|Cancelled|TimedOut|Failed|Cancelling)
                break
                ;;
            esac
            sleep 10
          done

          invocation="$(
            aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "${{ vars.AWS_GROMOZEKA_INSTANCE_ID }}" \
              --output json
          )"
          jq -r '.StandardOutputContent' <<< "$invocation"
          jq -r '.StandardErrorContent' <<< "$invocation" >&2
          [[ "$(jq -r '.Status' <<< "$invocation")" == "Success" ]]
