# Tree-sitter
ktreesitter = { module = "io.github.tree-sitter:ktreesitter", version.ref = "ktreesitter" }

# LSP4J (Language Server Protocol for Java)
lsp4j = { module = "org.eclipse.lsp4j:org.eclipse.lsp4j", version.ref = "lsp4j" }

