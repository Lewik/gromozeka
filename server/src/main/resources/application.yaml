spring:
  main:
    web-application-type: none
  banner:
    location: classpath:banner.txt
  rabbitmq:
    publisher-confirm-type: simple

# Reranker Configuration
reranker:
  auto-start: false
  url: http://localhost:7997
  model: mixedbread-ai/mxbai-rerank-xsmall-v1
  python-version: "3.12"
  startup-timeout-seconds: 120

gromozeka:
  runtime:
    server:
      enabled: true
    worker:
      enabled: false
    rabbit:
      enabled: ${GROMOZEKA_RUNTIME_RABBIT_ENABLED:true}
      exchange: gromozeka.runtime.work
      queue: gromozeka.runtime.work
      shards: ${GROMOZEKA_RUNTIME_RABBIT_SHARDS:16}
      dead-letter-exchange: gromozeka.runtime.work.dlx
      max-redeliveries: ${GROMOZEKA_RUNTIME_RABBIT_MAX_REDELIVERIES:8}
      events-exchange: gromozeka.runtime.events
      events-queue-prefix: gromozeka.runtime.events
