<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gromozeka Web</title>
    <meta name="application-name" content="Gromozeka">
    <meta name="theme-color" content="#111318">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Gromozeka">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <script type="application/javascript" src="gromozeka.js"></script>
    <script>
        if ("serviceWorker" in navigator && window.isSecureContext) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("sw.js").catch(() => {
                    // Local HTTP over Tailscale is expected to skip service workers.
                });
            });
        }
    </script>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #111318;
            overscroll-behavior: none;
        }

        #composeApp {
            width: 100%;
            height: 100%;
            padding-top: env(safe-area-inset-top);
            padding-right: env(safe-area-inset-right);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            box-sizing: border-box;
        }
    </style>
</head>
<body>
<div id="composeApp"></div>
</body>
</html>
