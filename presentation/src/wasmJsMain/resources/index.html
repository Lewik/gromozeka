<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gromozeka Web</title>
    <meta name="application-name" content="Gromozeka">
    <meta name="theme-color" content="#111318">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Gromozeka">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <script>
        (function () {
            // Mobile Safari keeps layout viewport stable while keyboard/browser chrome changes visualViewport.
            function updateVisualViewport() {
                const viewport = window.visualViewport;
                const root = document.documentElement;
                const width = viewport ? viewport.width : window.innerWidth;
                const height = viewport ? viewport.height : window.innerHeight;
                const left = viewport ? viewport.offsetLeft : 0;
                const top = viewport ? viewport.offsetTop : 0;

                root.style.setProperty("--gromozeka-visual-viewport-width", `${width}px`);
                root.style.setProperty("--gromozeka-visual-viewport-height", `${height}px`);
                root.style.setProperty("--gromozeka-visual-viewport-left", `${left}px`);
                root.style.setProperty("--gromozeka-visual-viewport-top", `${top}px`);
            }

            function updateVisualViewportAndNotifyCompose() {
                updateVisualViewport();
                window.requestAnimationFrame(() => window.dispatchEvent(new Event("resize")));
            }

            updateVisualViewport();
            window.addEventListener("orientationchange", () => window.setTimeout(updateVisualViewportAndNotifyCompose, 250));
            document.addEventListener("focusin", () => window.requestAnimationFrame(updateVisualViewportAndNotifyCompose));
            document.addEventListener("focusout", () => window.setTimeout(updateVisualViewportAndNotifyCompose, 250));

            if (window.visualViewport) {
                window.visualViewport.addEventListener("resize", updateVisualViewportAndNotifyCompose);
                window.visualViewport.addEventListener("scroll", updateVisualViewportAndNotifyCompose);
                window.visualViewport.addEventListener("scrollend", updateVisualViewportAndNotifyCompose);
            } else {
                window.addEventListener("resize", updateVisualViewport);
            }
        })();
    </script>
    <script defer type="application/javascript" src="gromozeka.js"></script>
    <script>

        if ("serviceWorker" in navigator && window.isSecureContext) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("sw.js").catch(() => {
                    // Local HTTP is expected to skip service workers.
                });
            });
        }
    </script>
    <style>
        :root {
            --gromozeka-visual-viewport-width: 100vw;
            --gromozeka-visual-viewport-height: 100dvh;
            --gromozeka-visual-viewport-left: 0px;
            --gromozeka-visual-viewport-top: 0px;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #111318;
            overscroll-behavior: none;
        }

        #gromozekaViewport {
            position: fixed;
            left: var(--gromozeka-visual-viewport-left);
            top: var(--gromozeka-visual-viewport-top);
            width: var(--gromozeka-visual-viewport-width);
            height: var(--gromozeka-visual-viewport-height);
            padding-top: env(safe-area-inset-top);
            padding-right: env(safe-area-inset-right);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            box-sizing: border-box;
            overflow: hidden;
            background: #111318;
        }

        #bootstrapLoader {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
        }

        #bootstrapLoader::after {
            width: 28px;
            height: 28px;
            content: "";
            border: 3px solid rgba(117, 172, 255, 0.2);
            border-top-color: #75acff;
            border-radius: 50%;
            animation: bootstrap-loader-spin 800ms linear infinite;
        }

        @keyframes bootstrap-loader-spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            #bootstrapLoader::after {
                animation-duration: 1600ms;
            }
        }

        #composeApp {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
<div id="gromozekaViewport">
    <div id="bootstrapLoader" role="status" aria-label="Loading Gromozeka"></div>
    <div id="composeApp"></div>
</div>
</body>
</html>
